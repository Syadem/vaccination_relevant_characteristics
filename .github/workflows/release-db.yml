name: Publish DB Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  publish-db-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4.1
          bundler-cache: true

      - name: Build DB files from tag version
        run: |
          bundle exec ruby scripts/publish.rb "${GITHUB_REF_NAME#v}" "${GITHUB_SHA}"
          ls -la release_assets

      - name: Create GitHub release and upload DB assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release_assets/*.db
          fail_on_unmatched_files: true

      - name: Configure AWS CLI credentials for Scaleway
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.SCW_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.SCW_SECRET_KEY }}
          aws-region: ${{ secrets.SCW_REGION }}

      - name: Upload DB assets to Scaleway Object Storage
        env:
          SCW_BUCKET: ${{ secrets.SCW_BUCKET }}
          SCW_ENDPOINT: ${{ secrets.SCW_ENDPOINT }}
        run: |
          aws s3 cp release_assets/ "s3://${SCW_BUCKET}/dumps/" \
            --recursive \
            --exclude "*" \
            --include "*.db" \
            --endpoint-url "${SCW_ENDPOINT}"

          aws s3 cp versions/ "s3://${SCW_BUCKET}/versions/" \
            --recursive \
            --exclude "*" \
            --include "*.json" \
            --endpoint-url "${SCW_ENDPOINT}"
